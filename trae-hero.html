<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trae: Next-Gen AI IDE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 深色背景 */
        body {
            background-color: #050505;
            margin: 0;
            overflow: hidden; /* 防止背景光斑溢出产生滚动条 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* 缓慢移动的彩色光斑 */
        .ambient-light {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 150vw;
            height: 150vw;
            max-width: 800px;
            max-height: 800px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, rgba(168,85,247,0.1) 40%, rgba(5,5,5,0) 70%);
            animation: pulse-light 8s infinite alternate ease-in-out;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes pulse-light {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.8;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }
        }

        /* 毛玻璃卡片 (带蓝紫渐变辅助) */
        .glass-card {
            position: relative;
            z-index: 10;
            width: 92%;
            max-width: 400px; /* 适配手机，并在桌面端限制最大宽度 */
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            background-image: linear-gradient(to bottom right, rgba(59, 130, 246, 0.05), rgba(168, 85, 247, 0.05));
        }

        /* 卡片 Hover 时的背景流光加速反馈 (交互细节) */
        .glass-card:hover ~ .ambient-light {
            animation-duration: 4s;
        }

        /* 金属质感渐变标题 */
        .metallic-text {
            background: linear-gradient(
                to right bottom,
                #ffffff 0%,
                #a1a1aa 50%,
                #e4e4e7 100%
            );
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.2;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.1);
        }

        /* 按钮摇摆动画 */
        .btn-shake {
            animation: shake 0.8s cubic-bezier(.36,.07,.19,.97) both;
            animation-delay: 1s; /* 加载后 1 秒执行提醒 */
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0) rotate(-1deg); }
            20%, 80% { transform: translate3d(2px, 0, 0) rotate(1deg); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0) rotate(-2deg); }
            40%, 60% { transform: translate3d(4px, 0, 0) rotate(2deg); }
        }

        /* 元素入场动画 */
        .fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <!-- 缓慢移动的彩色光斑背景 -->
    <div class="ambient-light"></div>

    <!-- 响应式核心容器 -->
    <div class="glass-card fade-in-up">
        
        <!-- 装饰性标签 (带 AI 呼吸灯星星) -->
        <div class="mb-4 inline-flex items-center justify-center rounded-full bg-white/5 px-3 py-1 text-sm font-medium text-blue-300 backdrop-blur-md border border-white/10 fade-in-up delay-1">
            <span class="mr-2 flex h-2 w-2 relative">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
            </span>
            AI 驱动的进化
        </div>
        
        <!-- 主标题 -->
        <h1 class="text-4xl sm:text-5xl mb-4 metallic-text fade-in-up delay-2">
            Trae: Next-Gen AI IDE
        </h1>
        
        <!-- 副标题 -->
        <p class="text-gray-400 mb-8 text-base sm:text-lg max-w-xs fade-in-up delay-3">
            你的下一款 AI 原生 IDE。<br/>极速、智能、无缝融入你的开发流。
        </p>
        
        <!-- 按钮容器 -->
        <div class="w-full fade-in-up delay-3 relative">
            <button class="btn-shake relative w-full rounded-xl bg-gradient-to-r from-blue-600 to-purple-600 p-[1px] group transition-all duration-300 hover:scale-[1.02] active:scale-[0.98]">
                <div class="flex h-full w-full items-center justify-center rounded-xl bg-gradient-to-r from-blue-600 to-purple-600 px-6 py-3.5 transition-all duration-300">
                    <span class="font-bold text-white text-lg tracking-wide">立即下载</span>
                </div>
                <!-- 按钮呼吸光晕反馈 -->
                <div class="absolute inset-0 -z-10 bg-gradient-to-r from-blue-600 to-purple-600 opacity-0 blur-xl transition-opacity duration-300 group-hover:opacity-60"></div>
            </button>
        </div>
        
    </div>
</body>
</html>
